<!DOCTYPE html>
<html>
  <body>
      <h2>Instructor Demo: Combining For Loops and Conditionals</h2>
      <script>
        for (let i = 1; i < 10; i++){
          if (i % 2 == 0){
            document.body.innerHTML += "<p> Here is a number divisible by 2: "+ i + "</p>";
          }
        }
      </script>
  </body>
</html>
