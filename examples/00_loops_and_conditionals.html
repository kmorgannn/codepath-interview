<!DOCTYPE html>
<html>
  <body>
    <h1>For Loop Demo</h1>
    <p>This is a demo of a for loop in JavaScript.</p>
    <p>The for loop will iterate over the numbers 1 to 10 and print the numbers that are divisible by 2.</p>
  </body>
  <script>
    for (let i = 1; i < 10; i++){
      if (i % 2 == 0){
        document.body.innerHTML += "<p> Here is a number divisible by 2: "+ i + "</p>";
      }
    }
  </script>
  <script>
    let i = 1;
    while ( i < 10) {
      if (i % 2 == 0){
        document.body.innerHTML += "<p> Here is a number divisible by 2: "+ i + "</p>";
      }
      i++;
    }
    </script>    
</html>
